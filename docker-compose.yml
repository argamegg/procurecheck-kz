services:
  mongodb:
    image: mongo:7
    container_name: procurecheck-mongodb
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - procurecheck-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: procurecheck-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - procurecheck-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-}
    container_name: procurecheck-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - procurecheck-network

volumes:
  mongo_data:

networks:
  procurecheck-network:
    driver: bridge
