services:
  mongodb:
    image: mongo:7
    container_name: procurecheck-mongodb-dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data_dev:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - procurecheck-dev-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: procurecheck-backend-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URL: mongodb://mongodb:27017/${DB_NAME:-procurecheck_kz}
    depends_on:
      mongodb:
        condition: service_healthy
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - procurecheck-dev-network

  frontend:
    image: node:20-alpine
    container_name: procurecheck-frontend-dev
    restart: unless-stopped
    working_dir: /app
    environment:
      REACT_APP_BACKEND_URL: http://localhost:${BACKEND_PORT:-8001}
      HOST: 0.0.0.0
      PORT: 3000
      BROWSER: none
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
    command: sh -c "yarn install --frozen-lockfile && yarn start"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - procurecheck-dev-network

volumes:
  mongo_data_dev:
  frontend_node_modules:

networks:
  procurecheck-dev-network:
    driver: bridge
